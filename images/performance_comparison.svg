<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550">
  <!-- White background -->
  <rect width="850" height="550" fill="#ffffff"/>

  <!-- Title -->
  <text x="425" y="38" text-anchor="middle" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Figure 6: Performance Comparison - Local LLM Inference and Memory Operations</text>

  <!-- Chart area -->
  <rect x="120" y="80" width="650" height="340" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="110" y="105" text-anchor="end" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">20</text>
  <text x="110" y="165" text-anchor="end" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">16</text>
  <text x="110" y="225" text-anchor="end" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">12</text>
  <text x="110" y="285" text-anchor="end" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">8</text>
  <text x="110" y="345" text-anchor="end" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">4</text>
  <text x="110" y="415" text-anchor="end" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">0</text>

  <!-- Y-axis title -->
  <text x="35" y="250" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="15" font-weight="bold" transform="rotate(-90 35 250)">Tokens per Second</text>

  <!-- Grid lines -->
  <line x1="120" y1="100" x2="770" y2="100" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="160" x2="770" y2="160" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="220" x2="770" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="280" x2="770" y2="280" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="340" x2="770" y2="340" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="400" x2="770" y2="400" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Bars for Ollama gemma3:1b - Klein Blue -->
  <rect x="155" y="233" width="65" height="167" fill="#002FA7" rx="3"/>
  <text x="187" y="223" text-anchor="middle" fill="#002FA7" font-family="Arial, sans-serif" font-size="15" font-weight="bold">11.1</text>

  <!-- Bars for Ollama llama2:7b - Klein Blue (darker shade) -->
  <rect x="240" y="253" width="65" height="147" fill="#001F7A" rx="3"/>
  <text x="272" y="243" text-anchor="middle" fill="#001F7A" font-family="Arial, sans-serif" font-size="15" font-weight="bold">9.8</text>

  <!-- Bars for Moxing llama2-7b - Mars Green -->
  <rect x="325" y="143" width="65" height="257" fill="#008B6C" rx="3"/>
  <text x="357" y="133" text-anchor="middle" fill="#008B6C" font-family="Arial, sans-serif" font-size="15" font-weight="bold">17.1</text>

  <!-- Bars for Memory Store ops - Burgundy Red -->
  <rect x="445" y="188" width="65" height="212" fill="#800020" rx="3"/>
  <text x="477" y="178" text-anchor="middle" fill="#800020" font-family="Arial, sans-serif" font-size="15" font-weight="bold">14.1</text>

  <!-- Bars for Memory Retrieve ops - Burgundy Red (darker shade) -->
  <rect x="530" y="158" width="65" height="242" fill="#600018" rx="3"/>
  <text x="562" y="148" text-anchor="middle" fill="#600018" font-family="Arial, sans-serif" font-size="15" font-weight="bold">16.1</text>

  <!-- Bars for Compression ops - Van Dyke Brown -->
  <rect x="615" y="103" width="65" height="297" fill="#4F3A2B" rx="3"/>
  <text x="647" y="93" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="15" font-weight="bold">19.8</text>

  <!-- X-axis labels -->
  <text x="187" y="425" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Ollama</text>
  <text x="187" y="443" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">gemma3:1b</text>

  <text x="272" y="425" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Ollama</text>
  <text x="272" y="443" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">llama2:7b</text>

  <text x="357" y="425" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Moxing</text>
  <text x="357" y="443" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">llama2-7b</text>

  <text x="477" y="425" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Memory</text>
  <text x="477" y="443" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">Store (K ops/s)</text>

  <text x="562" y="425" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Memory</text>
  <text x="562" y="443" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">Retrieve (K ops/s)</text>

  <text x="647" y="425" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Compression</text>
  <text x="647" y="443" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">(K ops/s)</text>

  <!-- Legend -->
  <rect x="120" y="470" width="18" height="18" fill="#002FA7" rx="3"/>
  <text x="145" y="485" fill="#374151" font-family="Arial, sans-serif" font-size="13">Ollama Inference</text>

  <rect x="290" y="470" width="18" height="18" fill="#008B6C" rx="3"/>
  <text x="315" y="485" fill="#374151" font-family="Arial, sans-serif" font-size="13">Moxing Inference</text>

  <rect x="470" y="470" width="18" height="18" fill="#800020" rx="3"/>
  <text x="495" y="485" fill="#374151" font-family="Arial, sans-serif" font-size="13">Memory Operations</text>

  <rect x="650" y="470" width="18" height="18" fill="#4F3A2B" rx="3"/>
  <text x="675" y="485" fill="#374151" font-family="Arial, sans-serif" font-size="13">Compression</text>

  <!-- Note -->
  <text x="425" y="525" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12" font-style="italic">Tested on Apple M2 Pro, 32GB RAM | 50-turn conversation simulation | Mean of 10 runs</text>
</svg>
