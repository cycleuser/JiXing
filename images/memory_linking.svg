<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550">
  <defs>
    <marker id="arrowT" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#002FA7"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="950" height="550" fill="#ffffff"/>

  <!-- Title -->
  <text x="475" y="38" text-anchor="middle" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Figure 3: Memory Linking Process - Establishing Spatiotemporal Connections</text>

  <!-- Time axis -->
  <line x1="100" y1="420" x2="850" y2="420" stroke="#374151" stroke-width="2"/>
  <text x="100" y="445" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">T0</text>
  <text x="320" y="445" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">T1</text>
  <text x="540" y="445" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">T2</text>
  <text x="760" y="445" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Tn</text>
  <text x="475" y="475" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="15">Time Axis</text>

  <!-- Memory Node M1 - Klein Blue tint -->
  <rect x="60" y="100" width="140" height="90" rx="8" fill="#e8edf5" stroke="#002FA7" stroke-width="2"/>
  <text x="130" y="128" text-anchor="middle" fill="#002FA7" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Memory M1</text>
  <text x="130" y="150" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Session: sess_001</text>
  <text x="130" y="170" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">Device: dev_A</text>
  <text x="130" y="185" text-anchor="middle" fill="#008B6C" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Importance: 0.9</text>

  <!-- Memory Node M2 - Burgundy Red tint -->
  <rect x="280" y="190" width="140" height="90" rx="8" fill="#f5e8eb" stroke="#800020" stroke-width="2"/>
  <text x="350" y="218" text-anchor="middle" fill="#800020" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Memory M2</text>
  <text x="350" y="240" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Session: sess_002</text>
  <text x="350" y="260" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">Device: dev_A</text>
  <text x="350" y="275" text-anchor="middle" fill="#008B6C" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Importance: 0.7</text>

  <!-- Memory Node M3 - Van Dyke Brown tint -->
  <rect x="500" y="120" width="140" height="90" rx="8" fill="#f0ede9" stroke="#4F3A2B" stroke-width="2"/>
  <text x="570" y="148" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Memory M3</text>
  <text x="570" y="170" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Session: sess_001</text>
  <text x="570" y="190" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">Device: dev_B</text>
  <text x="570" y="205" text-anchor="middle" fill="#008B6C" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Importance: 0.85</text>

  <!-- Memory Node M4 - Mars Green tint -->
  <rect x="720" y="230" width="140" height="90" rx="8" fill="#e8f0ed" stroke="#008B6C" stroke-width="2"/>
  <text x="790" y="258" text-anchor="middle" fill="#008B6C" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Memory M4</text>
  <text x="790" y="280" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Session: sess_003</text>
  <text x="790" y="300" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">Device: dev_A</text>
  <text x="790" y="315" text-anchor="middle" fill="#008B6C" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Importance: 0.6</text>

  <!-- Temporal Links (dashed Klein Blue) -->
  <path d="M200 145 Q240 170 280 210" stroke="#002FA7" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
  <path d="M420 190 Q460 160 500 155" stroke="#002FA7" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
  <path d="M640 165 Q680 200 720 250" stroke="#002FA7" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>

  <!-- Spatial Links (solid Burgundy Red, same device) -->
  <path d="M200 145 Q260 80 350 120" stroke="#800020" stroke-width="3" fill="none"/>
  <path d="M420 165 Q490 80 570 120" stroke="#800020" stroke-width="3" fill="none"/>
  <path d="M420 190 Q570 210 720 250" stroke="#800020" stroke-width="3" fill="none"/>

  <!-- Semantic Links (dashed Van Dyke Brown) -->
  <path d="M200 180 Q340 110 500 170" stroke="#4F3A2B" stroke-width="2.5" fill="none" stroke-dasharray="4,4"/>
  <path d="M350 270 Q510 320 720 290" stroke="#4F3A2B" stroke-width="2.5" fill="none" stroke-dasharray="4,4"/>

  <!-- Legend -->
  <rect x="40" y="495" width="350" height="45" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="60" y="515" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Link Types:</text>
  <line x1="60" y1="530" x2="95" y2="530" stroke="#002FA7" stroke-width="3.5" stroke-dasharray="6,4"/>
  <text x="105" y="534" fill="#374151" font-family="Arial, sans-serif" font-size="12">Temporal</text>
  <line x1="175" y1="530" x2="210" y2="530" stroke="#800020" stroke-width="3.5"/>
  <text x="220" y="534" fill="#374151" font-family="Arial, sans-serif" font-size="12">Spatial (same device)</text>
  <line x1="330" y1="530" x2="365" y2="530" stroke="#4F3A2B" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="375" y="534" fill="#374151" font-family="Arial, sans-serif" font-size="12">Semantic</text>

  <!-- Linking Rules -->
  <rect x="420" y="495" width="490" height="45" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="440" y="515" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Linking Rules:</text>
  <text x="440" y="534" fill="#374151" font-family="Arial, sans-serif" font-size="12">Temporal: |t1 - t2| &lt;= 1 hour</text>
  <text x="620" y="534" fill="#374151" font-family="Arial, sans-serif" font-size="12">Spatial: same device_id</text>
  <text x="770" y="534" fill="#374151" font-family="Arial, sans-serif" font-size="12">Semantic: cos_sim &gt; 0.5</text>
</svg>
