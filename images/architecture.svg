<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 620">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#002FA7"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="850" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="425" y="38" text-anchor="middle" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Figure 2: JiXing Long-Term Memory System Architecture</text>

  <!-- Input Layer - Klein Blue tint -->
  <rect x="40" y="70" width="200" height="90" rx="8" fill="#e8edf5" stroke="#002FA7" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="100" text-anchor="middle" fill="#002FA7" font-family="Arial, sans-serif" font-size="16" font-weight="bold">User Input</text>
  <text x="140" y="122" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">(Prompt + Context)</text>
  <text x="140" y="144" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12" font-style="italic">jixing ollama run gemma3:1b</text>

  <!-- Arrow to Indexer - Klein Blue -->
  <path d="M240 115 L280 115" stroke="#002FA7" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Spatiotemporal Indexer - Burgundy Red tint -->
  <rect x="280" y="70" width="220" height="90" rx="8" fill="#f5e8eb" stroke="#800020" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="100" text-anchor="middle" fill="#800020" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Spatiotemporal</text>
  <text x="390" y="122" text-anchor="middle" fill="#800020" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Indexer</text>
  <text x="390" y="144" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Time + Location + Device</text>

  <!-- Arrow to Memory Store - Burgundy Red -->
  <path d="M500 115 L540 115" stroke="#800020" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Memory Store - Mars Green tint -->
  <rect x="540" y="70" width="270" height="90" rx="8" fill="#e8f0ed" stroke="#008B6C" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="100" text-anchor="middle" fill="#008B6C" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Memory Store</text>
  <text x="675" y="122" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">SQLite + Vector Index</text>
  <text x="675" y="144" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12">Linked Memories</text>

  <!-- Arrow from Input to Memory Store (dashed) - Burgundy Red -->
  <path d="M240 115 L540 115" stroke="#800020" stroke-width="1.5" stroke-dasharray="6,4" fill="none"/>

  <!-- Memory Linker - Van Dyke Brown tint -->
  <rect x="280" y="210" width="220" height="120" rx="8" fill="#f0ede9" stroke="#4F3A2B" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="240" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Memory Linker</text>
  <text x="390" y="262" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Temporal | Spatial | Semantic</text>
  <rect x="300" y="275" width="80" height="28" rx="5" fill="#e8edf5" stroke="#002FA7" stroke-width="1"/>
  <text x="340" y="294" text-anchor="middle" fill="#002FA7" font-family="Arial, sans-serif" font-size="13" font-weight="bold">T-Link</text>
  <rect x="395" y="275" width="80" height="28" rx="5" fill="#f5e8eb" stroke="#800020" stroke-width="1"/>
  <text x="435" y="294" text-anchor="middle" fill="#800020" font-family="Arial, sans-serif" font-size="13" font-weight="bold">S-Link</text>

  <!-- Connection: Indexer to Linker - Van Dyke Brown -->
  <path d="M390 160 L390 210" stroke="#4F3A2B" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Semantic Compressor - Burgundy Red tint -->
  <rect x="280" y="370" width="220" height="80" rx="8" fill="#f5e8eb" stroke="#800020" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="400" text-anchor="middle" fill="#800020" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Semantic Compressor</text>
  <text x="390" y="425" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Importance-Based Compression</text>

  <!-- Connection: Linker to Compressor - Burgundy Red -->
  <path d="M390 330 L390 370" stroke="#800020" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Retrieval Engine - Klein Blue tint -->
  <rect x="280" y="490" width="220" height="80" rx="8" fill="#e8edf5" stroke="#002FA7" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="520" text-anchor="middle" fill="#002FA7" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Retrieval Engine</text>
  <text x="390" y="545" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Hybrid Search + Ranking</text>

  <!-- Connection: Compressor to Retrieval - Klein Blue -->
  <path d="M390 450 L390 490" stroke="#002FA7" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Model Runner - Mars Green tint -->
  <rect x="540" y="270" width="270" height="140" rx="8" fill="#e8f0ed" stroke="#008B6C" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="300" text-anchor="middle" fill="#008B6C" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Local LLM Runner</text>
  <text x="675" y="322" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Ollama / Moxing Adapter</text>
  <rect x="565" y="335" width="90" height="32" rx="5" fill="#002FA7"/>
  <text x="610" y="356" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">OLLAMA</text>
  <rect x="670" y="335" width="90" height="32" rx="5" fill="#800020"/>
  <text x="715" y="356" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">MOXING</text>
  <text x="675" y="395" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="12" font-style="italic">gemma3:1b, llama2, etc.</text>

  <!-- Connection: Retrieval to Model Runner (dashed) - Klein Blue -->
  <path d="M500 530 L540 340" stroke="#002FA7" stroke-width="1.5" stroke-dasharray="6,4" fill="none"/>

  <!-- Output - Mars Green tint -->
  <rect x="540" y="460" width="270" height="80" rx="8" fill="#e8f0ed" stroke="#008B6C" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="490" text-anchor="middle" fill="#008B6C" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Response + Metrics</text>
  <text x="675" y="515" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="13">Token count, Latency, Session ID</text>

  <!-- Connection: Retrieval to Output - Mars Green -->
  <path d="M500 530 L540 500" stroke="#008B6C" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Link types legend -->
  <rect x="40" y="210" width="180" height="140" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="130" y="240" text-anchor="middle" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Memory Links</text>
  <line x1="60" y1="265" x2="95" y2="265" stroke="#002FA7" stroke-width="3.5"/>
  <text x="105" y="270" fill="#374151" font-family="Arial, sans-serif" font-size="13">Temporal</text>
  <line x1="60" y1="295" x2="95" y2="295" stroke="#800020" stroke-width="3.5"/>
  <text x="105" y="300" fill="#374151" font-family="Arial, sans-serif" font-size="13">Spatial</text>
  <line x1="60" y1="325" x2="95" y2="325" stroke="#4F3A2B" stroke-width="3.5"/>
  <text x="105" y="330" fill="#374151" font-family="Arial, sans-serif" font-size="13">Semantic</text>

  <!-- Footer -->
  <text x="425" y="600" text-anchor="middle" fill="#4F3A2B" font-family="Arial, sans-serif" font-size="13">Local AI Model Assistant with Spatiotemporal Long-Term Memory</text>
</svg>
